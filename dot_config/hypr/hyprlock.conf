source = ~/.config/omarchy/current/theme/hyprlock.conf

general {
    ignore_empty_input = true
}

background {
    monitor =
    color = $color
    path = ~/.config/omarchy/current/background
    blur_passes = 3
}

animations {
    enabled = false
}

input-field {
    monitor =
    size = 650, 100
    position = 0, 0
    halign = center
    valign = center

    inner_color = $inner_color
    outer_color = $outer_color
    outline_thickness = 4

    font_family = JetBrainsMono Nerd Font
    font_color = $font_color

    placeholder_text = Enter Password
    check_color = $check_color
    fail_text = <i>$FAIL ($ATTEMPTS)</i>

    rounding = 0
    shadow_passes = 0
    fade_on_empty = false
}

auth {
    fingerprint:enabled = true
}

# Album art of the currently playing MPRIS track (refreshes every 2s).
# Pulls cover via playerctl from MPD (mpd-mpris bridges MPD → MPRIS).
image {
    monitor =
    path = /tmp/lockscreen-art.png
    size = 350
    rounding = 12
    border_size = 0
    halign = center
    valign = top
    position = 0, -180
    reload_time = 2
    reload_cmd = playerctl --player=mpd metadata mpris:artUrl 2>/dev/null | sed 's|^file://||' | xargs -I {} cp {} /tmp/lockscreen-art.png 2>/dev/null
}
