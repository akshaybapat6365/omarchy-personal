# Intentional fixed workspace homes only.
#
# General-purpose apps like browsers are deliberately not routed here. They are
# used by terminals, agents, tests, xdg-open, OAuth flows, and docs, so they
# should follow Hyprland's origin tracking instead of a global class rule.

# Chat and music are persistent singleton-style apps, so fixed homes are useful.
windowrule = workspace 4 silent, match:class (signal|Slack|WhatsApp|discord)
windowrule = workspace 5 silent, match:class (Spotify|spotify)
