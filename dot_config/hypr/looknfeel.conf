# Omarchy look'n'feel — subtle premium polish (no rounded corners by request)

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    # gaps_in / gaps_out / border_size all kept at Omarchy defaults
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    # Dim disabled — every focus change retriggers a full-frame composite pass
    # for the dim layer; on a 4K@60Hz panel through a hybrid GPU pipeline
    # that's a measurable per-frame cost. Removing it sharpens scroll/UI feel.
    dim_inactive = false
    dim_strength = 0.06

    # Blur disabled for the same reason — multi-pass blur shader on 4K panel
    # is the single most expensive per-frame op the compositor does.
    blur {
        enabled = false
    }

    # Phase 9 — subtle visual polish (cheap on the iGPU even at 4K)
    rounding = 6
    active_opacity = 1.0
    inactive_opacity = 0.96

    # Hyprland 0.54.x: shadow lives in a sub-block, not flat keys.
    shadow {
        enabled = true
        range = 12
        render_power = 3
        color = rgba(00000060)
    }
}

# Phase 10 — borders-plus-plus + hyprtrails plugin{} block REMOVED.
# hyprwm motion-polish plugins (borders-plus-plus, hyprtrails, hyprfocus,
# hyprbars, hyprscrolling) all fail to build against Hyprland 0.54.3.
# The block above was harmless dormant config; trimmed to keep the file clean.
# Re-add when Omarchy bumps Hyprland to 0.55+ (which would also need a
# parallel rewrite of Phase-1 trackpad gesture syntax: hyprlang → Lua).

# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
    # Phase B — newm-style "wall slide" feel for workspace transitions.
    # Bezier is a smooth deceleration curve (tactile, not bouncy). Switching
    # workspaces uses pure `slide` (vs default `slidefade`) so adjacent
    # workspaces appear to slide past as if on a 2D wall.
    bezier    = wallSlide, 0.16, 0.84, 0.44, 1.0
    animation = workspaces,       1, 4, wallSlide, slide
    animation = specialWorkspace, 1, 4, wallSlide, slidefadevert
}

# https://wiki.hypr.land/Configuring/Variables/#layout
layout {
    # Avoid overly wide single-window layouts on wide screens
    # single_window_aspect_ratio = 1 1
}

# Stop the compositor from switching workspace / stealing focus when an app
# sends an xdg-activation request (codex bell, Slack notifications, etc).
# Apps still mark themselves urgent (waybar highlights the workspace) — we
# just decide when to look. Overrides Omarchy default at
# ~/.local/share/omarchy/default/hypr/looknfeel.conf:126.
misc {
    focus_on_activate = false

    # Keep delayed child windows with the workspace that launched them instead
    # of whatever workspace happens to be active when they finally map.
    initial_workspace_tracking = 2

    # VFR off → constant 60Hz frame pacing. With VFR=1 (default) the compositor
    # skips frames when "nothing changes", but on a hybrid-GPU laptop the
    # frame-skip detection has hysteresis that makes scroll/animation feel
    # stuttery (two slow frames + one fast). Constant pacing > variable here.
    vfr = false

    # Hyprland 0.48+ ANR popups are false-positive noisy for CEF/winit apps
    # such as Stremio Linux Shell on this setup; keep compositor pings silent.
    enable_anr_dialog = false
}

# Direct scanout: when a fullscreen app is focused, hand its buffer to the
# display controller without a compositor pass. Drops one full GPU round-trip
# for fullscreen video / browser. (`render:direct_scanout` is the 0.54.x name;
# `misc:no_direct_scanout` was renamed.)
render {
    direct_scanout = true
}

# Don't teleport the mouse cursor along with workspace changes.
# Overrides Omarchy default at the same file, line 134.
cursor {
    warp_on_change_workspace = 0
}
