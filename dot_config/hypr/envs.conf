# Force Hyprland's Aquamarine renderer onto the Intel iGPU (card2).
# The eDP-1 panel is wired directly to Intel; rendering on NVIDIA would
# require a cross-PCIe buffer copy every frame, killing scroll smoothness.
# NVIDIA stays available via prime-run / DRI_PRIME=1 for explicit use.
env = AQ_DRM_DEVICES,/dev/dri/by-path/pci-0000:00:02.0-card

# Default OpenGL / VAAPI providers to mesa+intel for the same reason.
env = __GLX_VENDOR_LIBRARY_NAME,mesa
env = LIBVA_DRIVER_NAME,iHD
env = VDPAU_DRIVER,va_gl

# NVIDIA-render forcing — disabled. Re-enable only if a specific NVIDIA-only
# workload (CUDA app outside prime-run, NVENC encoder) needs it system-wide.
# env = NVD_BACKEND,direct
# env = LIBVA_DRIVER_NAME,nvidia
# env = __GLX_VENDOR_LIBRARY_NAME,nvidia
