# ---- Aether (wallpaper → theme) launcher ----
# Env vars force WebKit2GTK GPU compositing — without this, gallery scroll is choppy
# because WebKit falls back to software rendering on some Wayland setups.
bindd = SUPER ALT, T, Aether (wallpaper-to-theme), exec, env WEBKIT_FORCE_COMPOSITING_MODE=1 WEBKIT_DISABLE_COMPOSITING_MODE=0 aether

# ---- Volume keys: target hardware Speaker sink directly ----
# EasyEffects Sink is the default (so apps get DSP), but @DEFAULT_AUDIO_SINK@
# would point to the virtual EE Sink — its volume just attenuates the input
# into the DSP chain, which produces a non-linear/limited response.
# Targeting the post-DSP Speaker sink with --device gives natural hardware
# volume control while the DSP chain still processes everything.
unbind = ,XF86AudioRaiseVolume
unbind = ,XF86AudioLowerVolume
unbind = ,XF86AudioMute
unbind = ALT,XF86AudioRaiseVolume
unbind = ALT,XF86AudioLowerVolume
bindeld = ,XF86AudioRaiseVolume, Volume up, exec, omarchy-swayosd-client --device alsa_output.pci-0000_00_1f.3-platform-sof_sdw.HiFi__Speaker__sink --output-volume raise
bindeld = ,XF86AudioLowerVolume, Volume down, exec, omarchy-swayosd-client --device alsa_output.pci-0000_00_1f.3-platform-sof_sdw.HiFi__Speaker__sink --output-volume lower
bindeld = ,XF86AudioMute, Mute, exec, omarchy-swayosd-client --device alsa_output.pci-0000_00_1f.3-platform-sof_sdw.HiFi__Speaker__sink --output-volume mute-toggle
bindeld = ALT, XF86AudioRaiseVolume, Volume up precise, exec, omarchy-swayosd-client --device alsa_output.pci-0000_00_1f.3-platform-sof_sdw.HiFi__Speaker__sink --output-volume +1
bindeld = ALT, XF86AudioLowerVolume, Volume down precise, exec, omarchy-swayosd-client --device alsa_output.pci-0000_00_1f.3-platform-sof_sdw.HiFi__Speaker__sink --output-volume -1

# omarchy-spend ambient widget — small floating AI-spend HUD in top-right.
# Owns Super+Alt+S since 2026-05-18; skwd-wall moved to Super+Alt+Shift+S above.
windowrule = float on, match:class org\.omarchy\.spend\.ambient
windowrule = size 200 80, match:class org\.omarchy\.spend\.ambient
# Hardcoded logical-pixel position: `100%-220` mis-resolves under HiDPI
# (eDP-1 is 3840x2400 physical, scale=2 -> 1920x1200 logical). For top-right
# placement of a 200x80 window with 20px gap: x = 1920 - 220 = 1700, y = 20.
# Recompute as (logical_width - window_w - gap) if monitor geometry changes.
windowrule = move 1700 20, match:class org\.omarchy\.spend\.ambient
windowrule = animation none, match:class org\.omarchy\.spend\.ambient
windowrule = pin on, match:class org\.omarchy\.spend\.ambient
windowrule = border_size 0, match:class org\.omarchy\.spend\.ambient
# omarchy-spend main TUI — large floating dashboard
windowrule = float on, match:class ai-spend
windowrule = size 80% 80%, match:class ai-spend
windowrule = center 1, match:class ai-spend
windowrule = pin off, match:class ai-spend
windowrule = animation popin 80%, match:class ai-spend
windowrule = border_size 2, match:class ai-spend
# Critical: unbind Omarchy's default `Super+Alt+S = move window to scratchpad`
# FIRST. Without this, Hyprland keeps BOTH binds alive and pressing the combo
# banishes the focused window to scratchpad AND launches the spend widget.
unbind = SUPER ALT, S
bindd = SUPER ALT, S, AI spend ambient widget, exec, omarchy-spend --ambient

# Hide/show focused windows without closing the app (Hyprland-style minimize).
bindd = SUPER SHIFT, H, Hide focused window, movetoworkspacesilent, special:hidden
bindd = SUPER SHIFT ALT, H, Show hidden windows, togglespecialworkspace, hidden
