# ---- Smart Universal Copy/Paste (overrides Omarchy default) ----
# Omarchy's default Super+C/V uses one Hyprland sendshortcut path for every app.
# clipboard-smart keeps non-terminals on that universal path, while terminals use
# PRIMARY-based copy and terminal-native paste routing so AI TUIs and shells keep
# bracketed paste behavior without logging clipboard text.
unbind = SUPER, C
unbind = SUPER, V
unbind = SUPER, Z
unbind = SUPER, Y
unbind = SUPER SHIFT, V
bindd = SUPER, C, Universal copy (smart),  exec, /home/akshaybapat/.local/bin/clipboard-smart copy
bindd = SUPER, V, Universal paste (smart), exec, /home/akshaybapat/.local/bin/clipboard-smart paste

# Undo / redo — synthesize Ctrl+Z / Ctrl+Y into the focused window after a
# 90 ms SUPER-release window. Works in any app that natively handles Ctrl+Z/Y.
bindd = SUPER, Z, Universal undo, exec, sh -c 'sleep 0.09 && hyprctl dispatch sendshortcut "CTRL,z,"'
bindd = SUPER, Y, Universal redo, exec, sh -c 'sleep 0.09 && hyprctl dispatch sendshortcut "CTRL,y,"'

# Clipboard history picker — fuzzy-search recent items via cliphist + walker.
# Requires `wl-paste --watch cliphist store` daemons in autostart.conf.
bindd = SUPER SHIFT, V, Clipboard history, exec, sh -c 'cliphist list | walker --dmenu --placeholder "clipboard history" | cliphist decode | wl-copy'

