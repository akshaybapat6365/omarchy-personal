# Application bindings — direct exec, NO uwsm-app wrapping. uwsm-app pipes
# spawns to wayland-wm-app-daemon (started at session boot on ws1), making
# the daemon the PID-tree ancestor. Hyprland's initial_workspace_tracking
# then places the new window on ws1 every time. The `[]` dispatcher prefix
# workaround does not survive the daemon indirection (verified empirically).
# Direct exec makes the spawned app the immediate child of Hyprland's
# dispatcher; PID tracking resolves correctly to the active workspace.
bindd = SUPER, RETURN, Terminal, exec, ghostty --working-directory="$(omarchy-cmd-terminal-cwd)"
bindd = SUPER ALT, RETURN, Tmux, exec, ghostty --working-directory="$(omarchy-cmd-terminal-cwd)" -e bash -c "tmux attach || tmux new -s Work"
bindd = SUPER SHIFT, RETURN, Browser, exec, omarchy-launch-browser
bindd = SUPER SHIFT, F, File manager, exec, nautilus --new-window
bindd = SUPER ALT SHIFT, F, File manager (cwd), exec, nautilus --new-window "$(omarchy-cmd-terminal-cwd)"
bindd = SUPER SHIFT, B, Browser, exec, omarchy-launch-browser
bindd = SUPER SHIFT ALT, B, Browser (private), exec, omarchy-launch-browser --private
bindd = SUPER SHIFT, M, Spotify, exec, omarchy-launch-or-focus spotify
# Canonical dual-surface YT Music entrypoints.
