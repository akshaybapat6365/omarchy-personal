# Phase 11 — wallpaper picker GUI. Moved off Super+Alt+P (user reported
# something outside Hyprland's source chain grabs it — likely Chromium PIP /
# screen-record / input-method handler). Super+Alt+I = "Image picker"; verified
# free across user + Omarchy default configs.
bindd = SUPER ALT, I, Wallpaper picker (waypaper), exec, waypaper

# Variety — auto-rotates wallpapers from internet feeds (Wallhaven, Unsplash,
# Bing, Reddit, Flickr, etc.). When it changes a wallpaper, set_wallpaper script
# at ~/.config/variety/scripts/set_wallpaper updates the Omarchy symlink and
