bindd = SUPER ALT, V, Variety (wallpaper feeds), exec, variety

# Hidamari — video / YouTube wallpapers. GTK GUI. Layers as a GTK fullscreen
# window above swaybg; kill with Ctrl+C in launching shell OR `killall hidamari`.
# Autostart disabled by default — runs only when launched.
bindd = SUPER ALT, W, Hidamari (video wallpaper), exec, hidamari

