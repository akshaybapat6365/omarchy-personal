# External git refs auto-pulled by `chezmoi apply` / `chezmoi update`.
# Refresh weekly (168h) unless --refresh-externals=always is passed.

[".local/share/ai-config"]
  type = "git-repo"
  url  = "https://github.com/akshaybapat6365/ai-config.git"
  refreshPeriod = "168h"
  [".local/share/ai-config".clone]
    args = ["--depth", "1"]
  [".local/share/ai-config".pull]
    args = ["--ff-only"]

[".config/quickshell"]
  type = "git-repo"
  url  = "https://github.com/bjarneo/quickshell.git"
  refreshPeriod = "168h"
  [".config/quickshell".clone]
    args = ["--depth", "1"]
  [".config/quickshell".pull]
    args = ["--ff-only"]
